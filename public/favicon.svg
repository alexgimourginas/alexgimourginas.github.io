<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left building -->
  <rect x="1"  y="13" width="9"  height="17" fill="#2a3a8c" stroke="#4a5fc0" stroke-width="0.4"/>
  <rect x="3"  y="17" width="2"  height="2"  fill="#00e5ff" opacity="0.5" filter="url(#gs)"/>
  <rect x="6"  y="21" width="2"  height="2"  fill="#00e5ff" opacity="0.4"/>

  <!-- Center building: tallest, no gap -->
  <rect x="10" y="8"  width="12" height="22" fill="#2a3a8c" stroke="#4a5fc0" stroke-width="0.4"/>
  <rect x="14" y="3"  width="4"  height="5"  fill="#2a3a8c" stroke="#4a5fc0" stroke-width="0.4"/>
  <circle cx="16" cy="2.5" r="1.2" fill="#ff2d55" opacity="0.9" filter="url(#gs)"/>
  <rect x="12" y="12" width="2"  height="2"  fill="#00e5ff" opacity="0.6" filter="url(#gs)"/>
  <rect x="17" y="15" width="2"  height="2"  fill="#ffb347" opacity="0.5"/>
  <rect x="12" y="20" width="2"  height="2"  fill="#00e5ff" opacity="0.4"/>

  <!-- Right building: no gap -->
  <rect x="22" y="16" width="9"  height="14" fill="#2a3a8c" stroke="#4a5fc0" stroke-width="0.4"/>
  <rect x="24" y="20" width="2"  height="2"  fill="#00e5ff" opacity="0.45" filter="url(#gs)"/>

  <!-- Neon horizon line -->
  <rect x="1" y="29.5" width="30" height="1.5" fill="#00e5ff" filter="url(#g)"/>
</svg>
