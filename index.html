<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Gimourginas — Neon District</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;700;900&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="scene.css">
</head>
<body>

  <!-- ── SCENE ── -->
  <div class="hs-scene">
    <div class="hs-sky"></div>
    <div class="hs-moon"></div>

    <!-- Landmark building A: lattice spire (left) -->
    <svg class="hs-landmark" id="hs-landmark-a" aria-hidden="true" viewBox="0 0 80 560" preserveAspectRatio="xMidYMax meet">
      <!-- Main tapered tower body -->
      <polygon points="40,18 18,520 62,520" fill="#0a0c24" stroke="#18224a" stroke-width="0.8"/>
      <!-- Cross-braces lower -->
      <line x1="19" y1="420" x2="61" y2="520" stroke="#141a3c" stroke-width="0.9" opacity=".8"/>
      <line x1="61" y1="420" x2="19" y2="520" stroke="#141a3c" stroke-width="0.9" opacity=".8"/>
      <line x1="22" y1="330" x2="58" y2="420" stroke="#141a3c" stroke-width="0.9" opacity=".7"/>
      <line x1="58" y1="330" x2="22" y2="420" stroke="#141a3c" stroke-width="0.9" opacity=".7"/>
      <line x1="26" y1="256" x2="54" y2="330" stroke="#141a3c" stroke-width="0.8" opacity=".6"/>
      <line x1="54" y1="256" x2="26" y2="330" stroke="#141a3c" stroke-width="0.8" opacity=".6"/>
      <!-- Observation deck platform -->
      <rect x="10" y="230" width="60" height="10" fill="#0d1130" stroke="#18224a" stroke-width="0.8"/>
      <rect x="13" y="228" width="54" height="3" fill="#1a2455" opacity=".4"/>
      <!-- Thin upper mast -->
      <rect x="37" y="0" width="6" height="230" fill="#0d1030" stroke="#16204a" stroke-width="0.5"/>
      <!-- Neon strip on obs deck -->
      <rect x="10" y="240" width="60" height="1.5" fill="#00e5ff" opacity=".28">
        <animate attributeName="opacity" values=".28;.1;.28" dur="5s" repeatCount="indefinite"/>
      </rect>
      <!-- Obs deck windows -->
      <rect x="17" y="233" width="4" height="4" fill="#00e5ff" opacity=".22">
        <animate attributeName="opacity" values=".22;.06;.22" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="38" y="233" width="4" height="4" fill="#ffb347" opacity=".18"/>
      <rect x="56" y="233" width="4" height="4" fill="#00e5ff" opacity=".16">
        <animate attributeName="opacity" values=".16;.04;.16" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Antenna blink -->
      <circle cx="40" cy="10" r="2.5" fill="#ff2d55" opacity=".75">
        <animate attributeName="opacity" values=".75;.15;.75" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </svg>

    <!-- Landmark building B: stepped ziggurat (right) -->
    <svg class="hs-landmark" id="hs-landmark-b" aria-hidden="true" viewBox="0 0 150 500" preserveAspectRatio="xMidYMax meet">
      <!-- Crown / antenna -->
      <rect x="68" y="22" width="14" height="38" fill="#0c0e28" stroke="#16204a" stroke-width="0.6"/>
      <rect x="64" y="14" width="22" height="12" fill="#0c0e28" stroke="#16204a" stroke-width="0.6"/>
      <circle cx="75" cy="8" r="3" fill="#ff2d95">
        <animate attributeName="opacity" values=".85;.12;.85" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <!-- Tier 4 (top) -->
      <rect x="44" y="60" width="62" height="78" fill="#0a0b24" stroke="#16204a" stroke-width="0.7"/>
      <!-- Tier 3 -->
      <rect x="28" y="138" width="94" height="88" fill="#090b22" stroke="#16204a" stroke-width="0.7"/>
      <!-- Tier 2 -->
      <rect x="12" y="226" width="126" height="100" fill="#08091f" stroke="#16204a" stroke-width="0.7"/>
      <!-- Tier 1 base -->
      <rect x="0"  y="326" width="150" height="174" fill="#07081c" stroke="#16204a" stroke-width="0.7"/>
      <!-- Neon tier edges -->
      <rect x="44" y="136" width="62" height="2" fill="#ff2d95" opacity=".32">
        <animate attributeName="opacity" values=".32;.1;.32" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="28" y="224" width="94" height="2" fill="#b44aff" opacity=".28">
        <animate attributeName="opacity" values=".28;.08;.28" dur="7.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="12" y="324" width="126" height="2" fill="#00e5ff" opacity=".25">
        <animate attributeName="opacity" values=".25;.07;.25" dur="5.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Windows tier 4 -->
      <rect x="52" y="72"  width="5" height="7" fill="#ffb347" opacity=".18"/>
      <rect x="68" y="72"  width="5" height="7" fill="#00e5ff" opacity=".14">
        <animate attributeName="opacity" values=".14;.04;.14" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="84" y="72"  width="5" height="7" fill="#ffb347" opacity=".16"/>
      <!-- Windows tier 3 -->
      <rect x="36" y="152" width="5" height="7" fill="#00e5ff" opacity=".12"/>
      <rect x="52" y="152" width="5" height="7" fill="#ffffff" opacity=".1"/>
      <rect x="68" y="152" width="5" height="7" fill="#00e5ff" opacity=".15">
        <animate attributeName="opacity" values=".15;.04;.15" dur="5s" repeatCount="indefinite"/>
      </rect>
      <rect x="84" y="152" width="5" height="7" fill="#ffb347" opacity=".1"/>
      <rect x="100" y="152" width="5" height="7" fill="#ffffff" opacity=".09"/>
    </svg>
    <div class="hs-stars" id="hs-stars"></div>
    <div class="hs-glow-orbs" id="hs-glow-orbs"></div>
    <canvas class="hs-flow-canvas"       id="hs-flow-canvas"></canvas>
    <svg class="hs-city-layer hs-city-back"  id="hs-city-back"  preserveAspectRatio="none"></svg>
    <svg class="hs-city-layer hs-city-mid"   id="hs-city-mid"   preserveAspectRatio="none"></svg>
    <svg class="hs-city-layer hs-city-front" id="hs-city-front" preserveAspectRatio="none"></svg>
    <canvas class="hs-windows-canvas"    id="hs-windows-canvas"></canvas>
    <div class="hs-building-signs"       id="hs-building-signs"></div>
    <div class="hs-wires-layer"          id="hs-wires-layer"></div>
    <canvas class="hs-rain-canvas"       id="hs-rain-canvas"></canvas>
    <div class="hs-street"></div>
    <div class="hs-street-reflection"></div>
    <canvas class="hs-reflection-canvas" id="hs-reflection-canvas"></canvas>
    <canvas class="hs-objects-canvas"    id="hs-objects-canvas"></canvas>
    <canvas class="hs-fog-canvas"        id="hs-fog-canvas"></canvas>
  </div>

  <!-- ── CONTENT ── -->
  <div class="hs-content">
    <div class="hs-hero-badge">Welcome to the district</div>

    <div class="hs-neon-title-wrap" id="hs-neon-title-wrap">
      <svg id="hs-neon-svg" class="hs-neon-svg" aria-hidden="true">
        <defs>
          <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#00e5ff"/>
            <stop offset="50%"  stop-color="#b44aff"/>
            <stop offset="100%" stop-color="#ff2d95"/>
          </linearGradient>
          <filter id="neonGlow">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <text class="hs-neon-text hs-neon-glow-outer"   text-anchor="middle" dominant-baseline="central">ALEX GIMOURGINAS</text>
        <text class="hs-neon-text hs-neon-stroke-base"  text-anchor="middle" dominant-baseline="central">ALEX GIMOURGINAS</text>
        <text class="hs-neon-text hs-neon-stroke-flow"  text-anchor="middle" dominant-baseline="central">ALEX GIMOURGINAS</text>
        <text class="hs-neon-text hs-neon-stroke-flow2" text-anchor="middle" dominant-baseline="central">ALEX GIMOURGINAS</text>
      </svg>
      <h1 class="hs-hero-title" aria-label="Alex Gimourginas">ALEX GIMOURGINAS</h1>
    </div>

    <p class="hs-hero-sub">Developer &bull; Designer &bull; Creator</p>
    <div class="hs-neon-hr"></div>

    <nav class="hs-nav-signs" id="hs-nav-signs">
      <a href="resume.pdf" target="_blank" rel="noopener noreferrer" class="nav-sign" data-c="cyan">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="nav-label">Résumé</span>
        <span class="nav-kanji">履</span>
      </a>
      <a href="projects.html" class="nav-sign" data-c="magenta">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="nav-label">Projects</span>
        <span class="nav-kanji">作</span>
      </a>
      <a href="about.html" class="nav-sign" data-c="amber">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">About Me</span>
        <span class="nav-kanji">人</span>
      </a>
      <button type="button" class="nav-sign" data-c="purple" id="contact-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span class="nav-label">Contact</span>
        <span class="nav-kanji">信</span>
      </button>
    </nav>
  </div>

  <!-- ── FOOTER ── -->
  <div class="hs-footer-row">
    <a href="https://github.com/alexgimourginas" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="https://linkedin.com/in/alexgimourginas" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a href="https://twitter.com/alexgimourginas" target="_blank" rel="noopener noreferrer">Twitter</a>
  </div>

  <!-- ── CONTACT MODAL ── -->
  <style>
    .cm-link {
      display: flex; align-items: center; gap: .9rem;
      padding: .75rem 1rem;
      border: 1px solid #ffffff0a; border-radius: 4px;
      text-decoration: none;
      background: #ffffff04;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
      cursor: pointer; position: relative; overflow: hidden;
      font-family: inherit; width: 100%; text-align: left;
    }
    .cm-link::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      transition: opacity .2s;
    }
    .cm-link:hover { transform: translateX(4px); }
    .cm-link[data-c="cyan"]    { border-color: #00e5ff18; }
    .cm-link[data-c="cyan"]::before    { background: #00e5ff; opacity: .4; }
    .cm-link[data-c="cyan"]:hover    { background: #00e5ff0d; border-color: #00e5ff44; box-shadow: 0 0 16px #00e5ff18; }
    .cm-link[data-c="magenta"] { border-color: #ff2d9518; }
    .cm-link[data-c="magenta"]::before { background: #ff2d95; opacity: .4; }
    .cm-link[data-c="magenta"]:hover { background: #ff2d950d; border-color: #ff2d9544; box-shadow: 0 0 16px #ff2d9518; }
    .cm-link[data-c="amber"]   { border-color: #ffb34718; }
    .cm-link[data-c="amber"]::before   { background: #ffb347; opacity: .4; }
    .cm-link[data-c="amber"]:hover   { background: #ffb3470d; border-color: #ffb34744; box-shadow: 0 0 16px #ffb34718; }
    .cm-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .cm-link[data-c="cyan"]    .cm-icon { color: #00e5ff; }
    .cm-link[data-c="magenta"] .cm-icon { color: #ff2d95; }
    .cm-link[data-c="amber"]   .cm-icon { color: #ffb347; }
    .cm-label {
      font-family: 'Orbitron', monospace; font-size: .55rem;
      letter-spacing: .18em; font-weight: 700;
      min-width: 4.5rem;
    }
    .cm-link[data-c="cyan"]    .cm-label { color: #00e5ff; }
    .cm-link[data-c="magenta"] .cm-label { color: #ff2d95; }
    .cm-link[data-c="amber"]   .cm-label { color: #ffb347; }
    .cm-value {
      font-family: 'Rajdhani', sans-serif; font-size: .88rem; font-weight: 400;
      color: #c8cee8; flex: 1; letter-spacing: .02em;
    }
    .cm-arrow-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      color: #ffffff28; transition: color .2s, transform .2s;
    }
    .cm-link[data-c="magenta"]:hover .cm-arrow-icon { color: #ff2d9566; transform: translateX(3px); }
    .cm-link[data-c="amber"]:hover   .cm-arrow-icon { color: #ffb34766; transform: translateX(3px); }
    .cm-indicator {
      width: 16px; height: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #ffffff28; transition: color .2s;
    }
    .cm-indicator svg { width: 15px; height: 15px; display: block; }
    .cm-indicator span { display: none; font-family: 'Orbitron', monospace; font-size: .5rem; letter-spacing: .12em; color: #00e5ff; white-space: nowrap; }
    .cm-indicator.copied svg { display: none; }
    .cm-indicator.copied span { display: block; }
    .cm-link[data-c="cyan"]:hover .cm-indicator { color: #00e5ff66; }
    #contact-close-btn:hover { background: #00e5ff0d !important; border-color: #00e5ff88 !important; }
  </style>
  <div id="contact-modal"
       style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:1000;">
    <div id="contact-modal-inner"
         style="background:#0a0d2e;border:1px solid #ffffff14;border-top:1px solid #00e5ff33;border-radius:6px;padding:2rem;max-width:480px;width:92%;box-shadow:0 0 60px #00000088, 0 0 30px #00e5ff08;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem;">
        <div>
          <h2 style="font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:.25em;color:#00e5ff;margin:0 0 .25rem;">CONTACT</h2>
        </div>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity=".35"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>

      <div style="display:flex;flex-direction:column;gap:.6rem;">
        <button type="button" class="cm-link" data-c="cyan" id="cm-email-btn"
                onclick="navigator.clipboard.writeText('alexandergimourginas@gmail.com').then(()=>{const ind=this.querySelector('.cm-indicator');ind.classList.add('copied');setTimeout(()=>ind.classList.remove('copied'),1800)})">
          <svg class="cm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span class="cm-label">EMAIL</span>
          <span class="cm-value">alexandergimourginas@gmail.com</span>
          <span class="cm-indicator">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>COPIED</span>
          </span>
        </button>
        <a href="https://www.linkedin.com/in/alexander-gimourginas/" target="_blank" rel="noopener noreferrer" class="cm-link" data-c="magenta">
          <svg class="cm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          <span class="cm-label">LINKEDIN</span>
          <span class="cm-value">alexander-gimourginas</span>
          <svg class="cm-arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
        </a>
        <a href="https://github.com/alexgimourginas" target="_blank" rel="noopener noreferrer" class="cm-link" data-c="amber">
          <svg class="cm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          <span class="cm-label">GITHUB</span>
          <span class="cm-value">alexgimourginas</span>
          <svg class="cm-arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
        </a>
      </div>

      <button type="button" id="contact-close-btn"
              style="margin-top:1.4rem;width:100%;font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.2em;color:#00e5ff;border:1px solid #00e5ff33;padding:.65rem;border-radius:3px;cursor:pointer;background:none;transition:background .2s,border-color .2s;">
        CLOSE
      </button>
    </div>
  </div>

  <script type="module" src="scene.js"></script>
</body>
</html>
